<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ServGo! — Acesso Administrativo</title>
    <!-- Sem indexação por robôs -->
    <meta name="robots" content="noindex, nofollow, noarchive">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../css/estiloServGo.css">
</head>
<body>

<div class="adm-login-page">
    <div class="adm-login-card">

        <!-- Logo -->
        <div class="adm-login-logo">
            <span class="serv-part">Serv</span><span class="go-part">Go!</span>
        </div>
        <div class="text-center mb-3">
            <span class="adm-login-badge">
                <i class="bi bi-shield-fill-check"></i>
                Acesso Administrativo
            </span>
        </div>

        <!-- Alerta dinâmico -->
        <div id="adm-login-alerta" style="display:none;"></div>

        <!-- Formulário -->
        <form id="form-admin-login" autocomplete="off" novalidate>

            <div class="mb-3">
                <label class="adm-field-label" for="adm-email-input">
                    <i class="bi bi-envelope-fill"></i> E-mail Administrativo
                </label>
                <input type="email" class="adm-input" id="adm-email-input"
                       placeholder="admin@servgo.com.br"
                       autocomplete="username" spellcheck="false">
            </div>

            <div class="mb-4">
                <label class="adm-field-label" for="adm-senha-input">
                    <i class="bi bi-lock-fill"></i> Senha
                </label>
                <div class="adm-input-wrap">
                    <input type="password" class="adm-input" id="adm-senha-input"
                           placeholder="••••••••••"
                           autocomplete="current-password"
                           style="padding-right:42px;">
                    <button type="button" class="adm-toggle-senha" id="adm-toggle-senha" tabindex="-1">
                        <i class="bi bi-eye" id="adm-toggle-ico"></i>
                    </button>
                </div>
            </div>

            <!-- Barra de tentativas -->
            <div class="adm-tentativas-barra" id="adm-tentativas-barra">
                <div class="adm-tentativas-label">
                    <span>Tentativas restantes</span>
                    <span id="adm-tentativas-texto">5 de 5</span>
                </div>
                <div class="adm-tentativas-track">
                    <div class="adm-tentativas-fill" id="adm-tentativas-fill"
                         style="width:100%;background:#22c55e;"></div>
                </div>
            </div>

            <!-- Mensagem de bloqueio com countdown -->
            <div class="adm-lockout-msg" id="adm-lockout-msg">
                <i class="bi bi-clock-history me-1"></i>
                Conta bloqueada. Tente novamente em
                <strong id="adm-lockout-countdown"></strong>.
            </div>

            <button type="submit" class="adm-btn-entrar" id="adm-btn-entrar">
                <div class="adm-spinner" id="adm-spinner"></div>
                <i class="bi bi-shield-lock-fill" id="adm-btn-ico"></i>
                <span id="adm-btn-texto">Acessar Painel</span>
            </button>

        </form>

        <!-- Link cadastro admin -->
        <div class="adm-link-cad">
            <i class="bi bi-shield-plus me-1"></i>
            Novo administrador?
            <a href="adminCadastro.html">Criar conta admin</a>
        </div>

        <!-- Voltar -->
        <div class="adm-back-link">
            <a href="../index.html">
                <i class="bi bi-arrow-left me-1"></i>Voltar ao site
            </a>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/sg-base-path.js"></script>
<script src="../js/script.js" defer></script>
</body>
</html>
